---
# Rook-Ceph deployment — operator first, then cluster
#
# Prerequisites per OSD node:
#   - At least one raw (unformatted) block device (NVMe preferred)
#   - Node labeled: kubectl label node <node> storage-node=true
#   - 4 CPU + 8GiB RAM minimum per OSD node
#
# This role deploys:
#   - Rook operator (controller)
#   - CephCluster with 3 monitors, 2 managers, OSDs on labeled nodes
#   - StorageClasses: ceph-block (RWO, default), ceph-filesystem (RWX), ceph-bucket (S3)

- name: Add Rook Helm repository
  kubernetes.core.helm_repository:
    name: rook-release
    repo_url: https://charts.rook.io/release
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['k8s_control'][0] }}"

- name: Create rook-ceph namespace
  kubernetes.core.k8s:
    name: rook-ceph
    api_version: v1
    kind: Namespace
    state: present
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['k8s_control'][0] }}"

# Label storage nodes so Rook knows which nodes to place OSDs on
- name: Label storage nodes for Ceph OSD placement
  ansible.builtin.command: >
    kubectl label node {{ item }} storage-node=true --overwrite
  loop: "{{ groups['k8s_storage'] | default(groups['k8s_workers']) }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true
  run_once: true
  delegate_to: "{{ groups['k8s_control'][0] }}"

# Install kernel modules required by Ceph RBD and CephFS
- name: Load rbd kernel module
  community.general.modprobe:
    name: rbd
    state: present
    persistent: present
  become: true
  when: ansible_system == "Linux"

- name: Load ceph kernel module
  community.general.modprobe:
    name: ceph
    state: present
    persistent: present
  become: true
  when: ansible_system == "Linux"

# ── Step 1: Deploy Rook operator ──────────────────────────────────────────────

- name: Deploy Rook-Ceph operator
  kubernetes.core.helm:
    name: rook-ceph
    chart_ref: rook-release/rook-ceph
    chart_version: "v1.15.3"
    release_namespace: rook-ceph
    create_namespace: false
    values_files:
      - "{{ playbook_dir }}/../k8s/storage/rook-ceph-operator-values.yaml"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['k8s_control'][0] }}"

- name: Wait for Rook operator to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment/rook-ceph-operator -n rook-ceph --timeout=180s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false
  run_once: true
  delegate_to: "{{ groups['k8s_control'][0] }}"

# ── Step 2: Deploy CephCluster ────────────────────────────────────────────────

- name: Deploy Ceph cluster (monitors, managers, OSDs, StorageClasses)
  kubernetes.core.helm:
    name: rook-ceph-cluster
    chart_ref: rook-release/rook-ceph-cluster
    chart_version: "v1.15.3"
    release_namespace: rook-ceph
    create_namespace: false
    values_files:
      - "{{ playbook_dir }}/../k8s/storage/rook-ceph-cluster-values.yaml"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['k8s_control'][0] }}"

# Ceph cluster takes several minutes to reach HEALTH_OK while OSDs initialize
- name: Wait for Ceph cluster to reach HEALTH_OK
  ansible.builtin.command: >
    kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph status
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: ceph_status
  retries: 24
  delay: 15
  until: "'HEALTH_OK' in ceph_status.stdout or 'HEALTH_WARN' in ceph_status.stdout"
  changed_when: false
  run_once: true
  delegate_to: "{{ groups['k8s_control'][0] }}"

- name: Show Ceph cluster health
  ansible.builtin.debug:
    msg: "{{ ceph_status.stdout_lines }}"
  run_once: true
