---
# k8s-worker — multi-platform node join
#
# Supported targets:
#   Debian/Ubuntu  — full apt install + kubeadm join (VPS, EC2, bare metal)
#   RedHat/Rocky/Alma — dnf install + kubeadm join (RHEL-family on-prem / GCP)
#   Darwin         — noop (macOS local control machine, not a K8s node)
#   Windows        — noop (use WSL2 for local dev; kubeadm is not supported natively)
#   Container      — noop (ansible_connection=local inside Docker/Podman dev env)

# ── Unsupported platform notices ──────────────────────────────────────────────

- name: MacOS detected — skipping worker join (not a valid K8s node target)
  ansible.builtin.debug:
    msg: >
      Darwin host detected. macOS cannot be a kubeadm worker node.
      For local testing, run the full stack inside Docker (tools/docker/docker-compose.yml)
      or use the VPS Docker edition (vps-docker/).
  when: ansible_os_family == "Darwin"

- name: Windows detected — skipping worker join (use WSL2 for local dev)
  ansible.builtin.debug:
    msg: >
      Windows host detected. Use WSL2 with Ubuntu for local kubeadm testing,
      or use the VPS Docker edition (vps-docker/).
  when: ansible_system == "Win32NT" or ansible_os_family == "Windows"

- name: Container environment detected — skipping worker join
  ansible.builtin.debug:
    msg: >
      Container host detected (ansible_virtualization_type={{ ansible_virtualization_type }}).
      Kubernetes worker setup is skipped inside containers.
      Use the host machine as the Ansible target or the vps-docker/ stack.
  when:
    - ansible_virtualization_type is defined
    - ansible_virtualization_type in ["docker", "podman", "container", "lxc"]

# ── Debian / Ubuntu (VPS, EC2 Ubuntu AMI, bare metal) ─────────────────────────

- name: Add Kubernetes apt signing key (Debian/Ubuntu)
  ansible.builtin.apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Add Kubernetes apt repository (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /"
    state: present
    filename: kubernetes
  become: true
  when: ansible_os_family == "Debian"

- name: Install kube packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - "kubelet=1.32.*"
      - "kubeadm=1.32.*"
      - "kubectl=1.32.*"
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Hold kube packages at installed version (Debian/Ubuntu)
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  become: true
  when: ansible_os_family == "Debian"

# ── RedHat / Rocky / AlmaLinux / CentOS Stream ────────────────────────────────

- name: Add Kubernetes dnf repository (RedHat-family)
  ansible.builtin.yum_repository:
    name: kubernetes
    description: Kubernetes
    baseurl: "https://pkgs.k8s.io/core:/stable:/v1.32/rpm/"
    enabled: true
    gpgcheck: true
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v1.32/rpm/repodata/repomd.xml.key"
    repo_gpgcheck: true
  become: true
  when: ansible_os_family == "RedHat"

- name: Install kube packages (RedHat-family)
  ansible.builtin.dnf:
    name:
      - "kubelet-1.32.*"
      - "kubeadm-1.32.*"
      - "kubectl-1.32.*"
    state: present
    disable_excludes: kubernetes
  become: true
  when: ansible_os_family == "RedHat"

- name: Enable and start kubelet (RedHat-family)
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started
  become: true
  when: ansible_os_family == "RedHat"

# ── Cluster join (all Linux targets) ─────────────────────────────────────────

- name: Join cluster
  ansible.builtin.command: "{{ hostvars[groups['k8s_control'][0]].kube_join_cmd }}"
  args:
    creates: /etc/kubernetes/kubelet.conf
  changed_when: false
  become: true
  when:
    - ansible_system == "Linux"
    - ansible_virtualization_type is not defined or ansible_virtualization_type not in ["docker", "podman", "container", "lxc"]
    - hostvars[groups['k8s_control'][0]].kube_join_cmd is defined
    - hostvars[groups['k8s_control'][0]].kube_join_cmd | length > 0
