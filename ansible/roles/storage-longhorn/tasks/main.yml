---
- name: Add Longhorn Helm repository
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['k8s_control'][0] }}"

- name: Install Longhorn prerequisites on all nodes
  ansible.builtin.apt:
    name:
      - open-iscsi
      - nfs-common
      - util-linux
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install Longhorn prerequisites on all nodes (RedHat-family)
  ansible.builtin.dnf:
    name:
      - iscsi-initiator-utils
      - nfs-utils
      - util-linux
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Enable and start iscsid
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started
  become: true
  when: ansible_system == "Linux"

- name: Deploy Longhorn
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn/longhorn
    chart_version: "1.7.2"
    release_namespace: longhorn-system
    create_namespace: true
    values_files:
      - "{{ playbook_dir }}/../k8s/storage/longhorn-values.yaml"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['k8s_control'][0] }}"

- name: Wait for Longhorn manager rollout
  ansible.builtin.command: >
    kubectl rollout status daemonset/longhorn-manager -n longhorn-system --timeout=300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false
  run_once: true
  delegate_to: "{{ groups['k8s_control'][0] }}"
