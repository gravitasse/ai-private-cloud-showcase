---
# k8s-control — multi-platform control plane init
#
# Supported targets:
#   Debian/Ubuntu  — full kubeadm init (VPS, EC2, bare metal)
#   RedHat/Rocky/Alma — full kubeadm init (RHEL-family)
#   Darwin         — noop (macOS local control machine, not a K8s node)
#   Windows        — noop (use WSL2)

# ── Platform notices ──────────────────────────────────────────────────────────

- name: MacOS detected — skipping control plane init
  ansible.builtin.debug:
    msg: >
      Darwin host detected. macOS cannot be a kubeadm control plane node.
      For local testing, use the VPS Docker edition (vps-docker/) or
      point Ansible at a remote Linux host.
  when: ansible_os_family == "Darwin"

- name: Windows detected — skipping control plane init
  ansible.builtin.debug:
    msg: "Windows host detected. Use WSL2 with Ubuntu for local kubeadm testing."
  when: ansible_system == "Win32NT" or ansible_os_family == "Windows"

# ── Debian / Ubuntu ───────────────────────────────────────────────────────────

- name: Add Kubernetes apt signing key (Debian/Ubuntu)
  ansible.builtin.apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Add Kubernetes apt repository (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /"
    state: present
    filename: kubernetes
  become: true
  when: ansible_os_family == "Debian"

- name: Install kube packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - "kubelet=1.32.*"
      - "kubeadm=1.32.*"
      - "kubectl=1.32.*"
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Hold kube packages at installed version (Debian/Ubuntu)
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  become: true
  when: ansible_os_family == "Debian"

# ── RedHat / Rocky / AlmaLinux / CentOS Stream ────────────────────────────────

- name: Add Kubernetes dnf repository (RedHat-family)
  ansible.builtin.yum_repository:
    name: kubernetes
    description: Kubernetes
    baseurl: "https://pkgs.k8s.io/core:/stable:/v1.32/rpm/"
    enabled: true
    gpgcheck: true
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v1.32/rpm/repodata/repomd.xml.key"
    repo_gpgcheck: true
  become: true
  when: ansible_os_family == "RedHat"

- name: Install kube packages (RedHat-family)
  ansible.builtin.dnf:
    name:
      - "kubelet-1.32.*"
      - "kubeadm-1.32.*"
      - "kubectl-1.32.*"
    state: present
    disable_excludes: kubernetes
  become: true
  when: ansible_os_family == "RedHat"

- name: Enable and start kubelet (RedHat-family)
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started
  become: true
  when: ansible_os_family == "RedHat"

# ── kubeadm init (all Linux) ──────────────────────────────────────────────────

- name: Kubeadm init
  ansible.builtin.command: >
    kubeadm init
    --pod-network-cidr=10.244.0.0/16
    --control-plane-endpoint={{ ansible_host }}:6443
  args:
    creates: /etc/kubernetes/admin.conf
  changed_when: false
  become: true
  when: ansible_system == "Linux"

- name: Copy admin.conf to ubuntu user (Debian/Ubuntu)
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: "0600"
    remote_src: true
  become: true
  when: ansible_os_family == "Debian"

- name: Copy admin.conf to ansible_user (RedHat-family)
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
    remote_src: true
  become: true
  when: ansible_os_family == "RedHat"

# ── CNI — Cilium ──────────────────────────────────────────────────────────────

- name: Add Cilium Helm repo
  ansible.builtin.command: helm repo add cilium https://helm.cilium.io/
  args:
    creates: /root/.local/share/helm/repository/cilium-index.yaml
  changed_when: false
  become: true
  when: ansible_system == "Linux"

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  changed_when: false
  become: true
  when: ansible_system == "Linux"

- name: Install Cilium CNI
  ansible.builtin.command: >
    helm upgrade --install cilium cilium/cilium
    --version 1.16.6
    --namespace kube-system
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false
  become: true
  when: ansible_system == "Linux"

# ── Join token for workers ────────────────────────────────────────────────────

- name: Get join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_cmd
  changed_when: false
  become: true
  when: ansible_system == "Linux"

- name: Set fact for workers
  ansible.builtin.set_fact:
    kube_join_cmd: "{{ join_cmd.stdout | default('') }}"
  when: ansible_system == "Linux"
