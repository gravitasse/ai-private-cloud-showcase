---
# base-os — multi-platform OS baseline
#
# Supported targets:
#   Debian/Ubuntu  — apt packages, swap disable, containerd
#   RedHat/Rocky/Alma — dnf packages, swap disable, containerd
#   Darwin         — noop (macOS local control machine)
#   Windows        — noop (use WSL2)
#   Container      — minimal (swap disable skipped, package install may be partial)

# ── Platform notices ──────────────────────────────────────────────────────────

- name: MacOS detected — skipping Linux base-os tasks
  ansible.builtin.debug:
    msg: "Darwin host detected. Base OS configuration is skipped on macOS."
  when: ansible_os_family == "Darwin"

- name: Windows detected — skipping base-os tasks
  ansible.builtin.debug:
    msg: "Windows host detected. Use WSL2 with Ubuntu for local kubeadm testing."
  when: ansible_system == "Win32NT" or ansible_os_family == "Windows"

# ── Debian / Ubuntu ───────────────────────────────────────────────────────────

- name: Update apt cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_os_family == "Debian"

- name: Install base packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - curl
      - git
      - vim
      - containerd
      - python3-pip
      - apt-transport-https
      - ca-certificates
      - gnupg
    state: present
  become: true
  when: ansible_os_family == "Debian"

# ── RedHat / Rocky / AlmaLinux / CentOS Stream ────────────────────────────────

- name: Install base packages (RedHat-family)
  ansible.builtin.dnf:
    name:
      - curl
      - git
      - vim
      - containerd
      - python3-pip
      - ca-certificates
      - gnupg2
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Enable and start containerd (RedHat-family)
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started
  become: true
  when: ansible_os_family == "RedHat"

# ── Swap disable (all Linux) ──────────────────────────────────────────────────

- name: Disable swap (Linux — required for kubeadm)
  ansible.builtin.command: swapoff -a
  changed_when: false
  become: true
  when:
    - ansible_system == "Linux"
    - ansible_swaptotal_mb | int > 0

- name: Remove swap entry from fstab (Linux)
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(/swap.*)'
    replace: '# \1'
  become: true
  when: ansible_system == "Linux"
