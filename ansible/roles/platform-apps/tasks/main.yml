---
- name: MacOS detected, skipping platform apps
  ansible.builtin.debug:
    msg: "Darwin host - skipping Argo CD / ai-apps install"
  when: ansible_os_family == "Darwin"

- name: Include Argo CD tasks
  ansible.builtin.include_tasks: argocd.yml
  when: ansible_os_family != "Darwin"

- name: Include Velero tasks
  ansible.builtin.include_tasks: velero.yml
  when: ansible_os_family != "Darwin"

- name: Include Monitoring tasks
  ansible.builtin.include_tasks: monitoring.yml
  when: ansible_os_family != "Darwin"

- name: Create AI namespace (Linux only)
  ansible.builtin.command: kubectl create ns ai-apps
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: ns_ai
  changed_when: ns_ai.rc == 0
  failed_when: ns_ai.rc not in [0, 1]
  when: ansible_os_family != "Darwin"
