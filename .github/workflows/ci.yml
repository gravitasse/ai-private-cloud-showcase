name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform init + validate (AWS dev)
        working-directory: terraform/envs/dev/aws
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform init + validate (GCP dev)
        working-directory: terraform/envs/dev/gcp
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform init + validate (OpenStack)
        working-directory: terraform/openstack
        run: |
          terraform init -backend=false
          terraform validate

  ansible:
    name: Ansible lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint ansible/site.yml
