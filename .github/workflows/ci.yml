name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform fmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      # Full terraform validate runs in the private repo where the modules live.
      # Showcase only checks formatting since private modules are not present here.
      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

  ansible:
    name: Ansible lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint and collections
        run: |
          pip install ansible-lint ansible-core
          ansible-galaxy collection install \
            kubernetes.core \
            community.general \
            amazon.aws \
            community.aws

      - name: Run ansible-lint
        run: ansible-lint ansible/site.yml
